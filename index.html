<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Что поесть? | Каталог</title>
    <style>
        :root { --bg-color: #f3f4f6; --text-color: #1f2937; --card-bg: #ffffff; --primary: #3b82f6; --accent: #10b981; --border: #e5e7eb; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; }
        
        #loginScreen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); position: absolute; top: 0; left: 0; width: 100%; z-index: 100; }
        .login-box { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .login-box input { font-size: 2rem; text-align: center; letter-spacing: 10px; width: 150px; padding: 10px; border: 2px solid var(--border); border-radius: 12px; margin: 10px 0 20px; outline: none; }
        .error-text { color: #ef4444; font-size: 0.9rem; display: none; margin-bottom: 10px; }

        #navBar { display: none; background: white; padding: 15px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 90; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .nav-btn { background: var(--bg-color); border: 1px solid var(--border); padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; color: var(--text-color); text-decoration: none; display: flex; align-items: center;}
        .nav-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .container { max-width: 1000px; width: 100%; margin: 0 auto; padding: 20px; }
        .controls { background: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); margin-bottom: 15px; text-align: center; }
        .controls-title { font-weight: bold; margin-bottom: 10px; color: #4b5563; font-size: 0.9rem; text-transform: uppercase; }
        button.filter-btn { background-color: var(--card-bg); border: 1px solid var(--border); color: var(--text-color); padding: 8px 16px; border-radius: 20px; cursor: pointer; margin: 3px; }
        button.filter-btn.active { background-color: var(--primary); color: white; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .card { background-color: var(--card-bg); border-radius: 12px; padding: 15px; border: 1px solid var(--border); display: flex; align-items: flex-start; gap: 15px; position: relative; cursor: pointer;}
        .card-icon { font-size: 2.5rem; line-height: 1;}
        .card-content h3 { margin: 0 0 5px 0; font-size: 1.1rem; padding-right: 40px;}
        .card-content p { margin: 0; font-size: 0.85rem; color: #6b7280; }
        
        /* МОДАЛЬНОЕ ОКНО РЕЦЕПТА */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 200; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 90%; max-width: 650px; max-height: 85vh; overflow-y: auto; padding: 30px; border-radius: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); position: relative; }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 2rem; cursor: pointer; color: #9ca3af; }
        .recipe-img { width: 100%; max-height: 250px; object-fit: cover; border-radius: 8px; margin-bottom: 15px; background: #e5e7eb; }
        .recipe-text { white-space: pre-line; background: #f9fafb; padding: 15px; border-radius: 8px; border-left: 4px solid var(--primary); margin-bottom: 15px; line-height: 1.5; }
        
        /* Конструктор */
        .addon-selector { background: #eff6ff; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px dashed var(--primary); text-align: center; }
        .addon-btn { background: white; border: 1px solid var(--primary); color: var(--primary); padding: 8px 12px; border-radius: 6px; cursor: pointer; margin: 5px; font-weight: bold; }
        .addon-btn.active { background: var(--primary); color: white; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <h2 style="margin: 0; color: #111827;">Доступ 🔒</h2>
            <input type="password" id="passInput" maxlength="4" onkeyup="if(event.key==='Enter') verify()">
            <div id="errorText" class="error-text">Неверный код!</div>
            <button class="nav-btn active" style="width: 100%; padding: 12px; justify-content: center;" onclick="verify()">Войти</button>
        </div>
    </div>

    <div id="navBar">
        <a href="index.html" class="nav-btn active">📖 Каталог блюд</a>
        <a href="arena.html" class="nav-btn">⚔️ Арена ужина (Игра)</a>
        <button class="nav-btn" style="background: #ef4444; color: white; border: none; margin-left: auto;" onclick="logout()">Выйти 🔒</button>
    </div>

    <div class="container" id="mainContent" style="display: none;">
        <h1 style="text-align:center; margin-top:0;">Наше меню</h1>
        <div class="controls" id="categoryFilters">
            <div class="controls-title">Категории</div>
            <button class="filter-btn active" onclick="setCategory('Все')">Все блюда</button>
            <button class="filter-btn" onclick="setCategory('Мясо')">🍗 Мясо</button>
            <button class="filter-btn" onclick="setCategory('Картофель')">🥔 Картошка</button>
            <button class="filter-btn" onclick="setCategory('Крупы')">🌾 Крупы</button>
            <button class="filter-btn" onclick="setCategory('Макароны')">🍝 Макароны</button>
            <button class="filter-btn" onclick="setCategory('Мучное')">🥖 Перекус / Лаваш</button>
        </div>
        
        <div class="grid" id="catalogGrid"></div>
    </div>

    <div class="modal" id="recipeModal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-modal" onclick="document.getElementById('recipeModal').style.display='none'">&times;</span>
            <h2 id="modalTitle" style="margin-top:0;">Название</h2>
            
            <div id="modalConstructor" class="addon-selector" style="display:none;">
                <div style="font-weight:bold; margin-bottom:8px;">Какой гарнир/добавку выберем? 🤔</div>
                <div id="addonButtons"></div>
            </div>

            <img id="modalImg" class="recipe-img" src="" alt="Фото блюда">
            <div id="modalRecipe" class="recipe-text"></div>

            <div id="addonRecipeBlock" style="display:none; border-top: 2px dashed var(--border); padding-top:15px; margin-top:15px;">
                <h3 id="addonTitle">Дополнительно</h3>
                <img id="addonImg" class="recipe-img" src="" alt="Фото добавки">
                <div id="addonRecipe" class="recipe-text"></div>
            </div>
        </div>
    </div>

    <script src="base.js"></script>
    <script>
        function logout() { localStorage.removeItem('auth'); location.reload(); }

        function verify() {
            if (typeof hashCode === 'undefined') { alert("Файл base.js не найден!"); return; }
            if (hashCode(document.getElementById('passInput').value) === correctHash || localStorage.getItem('auth') === 'true') {
                localStorage.setItem('auth', 'true');
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('navBar').style.display = 'flex';
                document.getElementById('mainContent').style.display = 'block';
                applyFilters();
            } else {
                document.getElementById('errorText').style.display = 'block';
                document.getElementById('passInput').value = '';
            }
        }
        if (localStorage.getItem('auth') === 'true') verify();

        let currentCat = 'Все';

        function applyFilters() {
            const grid = document.getElementById('catalogGrid');
            if (typeof meals === 'undefined') return;

            // Отображаем в каталоге ТОЛЬКО основные блюда (у которых ID меньше 100), скрывая системные допы
            let filtered = meals.filter(m => m.id < 100);
            if (currentCat !== 'Все') filtered = filtered.filter(m => m.cat === currentCat);
            
            grid.innerHTML = '';
            filtered.forEach(m => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openRecipe(m.id);
                card.innerHTML = `<div class="card-icon">${m.icon}</div><div class="card-content"><h3>${m.name}</h3><p>${m.desc}</p></div>`;
                grid.appendChild(card);
            });
        }

        function setCategory(cat) {
            currentCat = cat;
            document.querySelectorAll('#categoryFilters .filter-btn').forEach(b => b.classList.toggle('active', b.innerText.includes(cat) || (cat === 'Все' && b.innerText === 'Все блюда')));
            applyFilters();
        }

        // ОТКРЫТИЕ ОКНА С РЕЦЕПТОМ
        function openRecipe(id) {
            const meal = meals.find(m => m.id === id);
            if(!meal) return;

            document.getElementById('modalTitle').innerText = meal.name;
            document.getElementById('modalImg').src = meal.img || 'https://placehold.co/600x400?text=Нет+фото';
            document.getElementById('modalRecipe').innerText = meal.recipe;
            
            // Сбрасываем блок с допами
            document.getElementById('addonRecipeBlock').style.display = 'none';
            const constructor = document.getElementById('modalConstructor');
            
            // Если у блюда прописаны addons (конструктор вариантов)
            if(meal.addons && meal.addons.length > 0) {
                constructor.style.display = 'block';
                const btnContainer = document.getElementById('addonButtons');
                btnContainer.innerHTML = '';

                meal.addons.forEach(addonId => {
                    const addon = meals.find(m => m.id === addonId);
                    if(addon) {
                        const btn = document.createElement('button');
                        btn.className = 'addon-btn';
                        btn.innerText = `${addon.icon} ${addon.name}`;
                        btn.onclick = () => selectAddon(addonId, btn);
                        btnContainer.appendChild(btn);
                    }
                });
            } else {
                constructor.style.display = 'none';
            }

            document.getElementById('recipeModal').style.display = 'flex';
        }

        // ВЫБОР ДОПОЛНЕНИЯ ВНУТРИ РЕЦЕПТА
        function selectAddon(addonId, clickedBtn) {
            // Переключаем активный класс у кнопок конструктора
            document.querySelectorAll('.addon-btn').forEach(b => b.classList.remove('active'));
            clickedBtn.classList.add('active');

            const addon = meals.find(m => m.id === addonId);
            if(!addon) return;

            // Показываем блок рецепта допа и подгружаем данные
            document.getElementById('addonTitle').innerText = `Вместе с: ${addon.name}`;
            document.getElementById('addonImg').src = addon.img || 'https://placehold.co/600x400?text=Нет+фото';
            document.getElementById('addonRecipe').innerText = addon.recipe;
            document.getElementById('addonRecipeBlock').style.display = 'block';
        }

        function closeModal(e) {
            if(e.target.id === 'recipeModal') document.getElementById('recipeModal').style.display = 'none';
        }
    </script>
</body>
</html>
